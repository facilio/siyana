name: Release

# Publishes the package to npm when a version tag (vX.Y.Z) is pushed.
# Requires a repo secret NPM_TOKEN: an npm granular/automation token with publish + "bypass 2FA".
# Provenance needs a PUBLIC repo and id-token permission (remove --provenance if the repo is private).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci # runs "prepare" → builds dist/
      - run: npm run validate
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
