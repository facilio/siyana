name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate data files
        run: npm run validate
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Check generated JSON schema is up to date
        run: |
          npm run gen-schema
          git diff --exit-code schema/asset.schema.json \
            || (echo "schema/asset.schema.json is stale — run 'npm run gen-schema' and commit." && exit 1)
